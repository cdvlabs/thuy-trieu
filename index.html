<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thủy Triều TP.HCM - Smart Dashboard 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root {
            --bg-body: #0f172a; --bg-glass: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1); --shadow: rgba(0, 0, 0, 0.3);
        }
        .light-mode {
            --bg-body: #f8fafc; --bg-glass: rgba(255, 255, 255, 0.85);
            --text-main: #0c4a6e; --text-muted: #64748b;
            --border: rgba(14, 165, 233, 0.1); --shadow: rgba(14, 165, 233, 0.05);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: all 0.4s ease; overflow-x: hidden; }
        .glass { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid var(--border); box-shadow: 0 10px 40px var(--shadow); }
        .card-tide { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .card-tide:hover { transform: translateY(-10px) scale(1.02); }
        /* Hiệu ứng nước dâng trong card */
        .water-fill { position: absolute; bottom: 0; left: 0; width: 100%; transition: height 1.5s ease-out; z-index: 0; opacity: 0.15; pointer-events: none; }
        .light-mode .water-fill { opacity: 0.1; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
        .light-mode input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 light-mode">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div class="flex-1">
                <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-br from-blue-600 via-sky-500 to-indigo-600 bg-clip-text text-transparent tracking-tight leading-tight">Thủy Triều TP.HCM</h1>
                <p id="updateTime" class="text-xs font-black mt-2 text-sky-600 uppercase tracking-[0.3em] flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_#3b82f6]"></span> Live Monitoring 2026
                </p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <button id="themeToggle" class="glass p-4 rounded-3xl shadow-xl hover:scale-110 transition-all">
                    <svg id="sunIcon" class="w-6 h-6 hidden text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
                    <svg id="moonIcon" class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
                <select id="stationSelect" class="glass px-6 py-4 rounded-3xl outline-none font-black text-sm shadow-xl">
                    <option value="Nhà Bè" selected>Trạm Nhà Bè</option>
                    <option value="Phú An">Trạm Phú An</option>
                    <option value="Thủ Dầu Một">Trạm Thủ Dầu Một</option>
                </select>
                <input type="date" id="datePicker" class="glass px-6 py-4 rounded-3xl outline-none font-black text-sm shadow-xl min-w-[180px]">
            </div>
        </header>

        <!-- Stats Section -->
        <div class="mb-12">
            <h3 id="statsTitle" class="text-sm font-black uppercase tracking-[0.2em] text-slate-500 mb-6 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-sky-500"></span> 
                Chi tiết dự báo ngày --/--
            </h3>
            <div id="statsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <!-- Chart Section -->
        <div class="glass p-6 md:p-12 rounded-[3.5rem] mb-12 shadow-2xl relative border-t-4 border-blue-500/20">
            <h3 class="text-xl md:text-2xl font-black mb-12 flex items-center gap-4">
                <span class="w-4 h-10 bg-blue-600 rounded-full shadow-[0_0_20px_#3b82f6]"></span> 
                Hệ thống giám sát 72 giờ
            </h3>
            <div class="h-[400px] md:h-[500px]">
                <canvas id="tideChart"></canvas>
            </div>
        </div>

        <div id="alertBox" class="hidden glass border-l-[12px] border-red-500 p-10 rounded-[3rem] flex items-start gap-10 mb-12 bg-red-500/5 shadow-2xl animate-in zoom-in-95">
            <div class="text-red-500 text-7xl animate-bounce mt-2">⚠️</div>
            <div>
                <h4 class="font-black text-3xl text-red-500 uppercase tracking-tighter">Cảnh báo Ngập Lụt</h4>
                <p id="alertMsg" class="text-xl mt-4 font-bold text-slate-500 leading-relaxed"></p>
            </div>
        </div>

        <footer class="text-center text-slate-400 text-sm py-16 font-black tracking-[0.3em] opacity-30">
            HCMC TIDE DASHBOARD &bull; 2026
        </footer>
    </div>

    <script>
        let rawData = {"Phú An": {"12/04": {"h": [0.88, 0.52, 0.39, -1.5], "t": ["13:00", "21:30", "18:30", "05:00"]}, "13/04": {"h": [1.04, 0.31, -0.28, -1.6], "t": ["14:00", "23:30", "21:00", "06:00"]}, "14/04": {"h": [1.12, 0.29, -0.56, -1.67], "t": ["14:00", "00:30", "20:30", "07:30"]}, "15/04": {"h": [1.23, 0.65, -0.84, -1.69], "t": ["15:00", "01:30", "21:00", "08:00"]}, "16/04": {"h": [1.32, 1.01, -1.04, -1.32], "t": ["18:00", "03:00", "23:00", "10:00"]}, "17/04": {"h": [1.37, 1.17, -1.27, -1.2], "t": ["18:00", "04:00", "23:00", "11:00"]}, "18/04": {"h": [1.41, 1.34, -1.5, -0.97], "t": ["19:00", "05:00", "23:30", "12:00"]}}, "Nhà Bè": {"12/04": {"h": [1.06, 0.48, -1.21], "t": ["15:30", "19:00", "07:00"]}, "13/04": {"h": [1.16, 0.34, 0.13, -1.26], "t": ["16:00", "00:35", "23:00", "07:30"]}, "14/04": {"h": [1.19, 0.57, -0.12, -1.19], "t": ["16:30", "02:20", "23:30", "09:00"]}, "15/04": {"h": [1.25, 0.81, -0.31, -1.14], "t": ["17:00", "03:00", "23:30", "10:00"]}, "16/04": {"h": [1.33, 1.03, -1.11, -1.63], "t": ["17:00", "01:30", "22:30", "09:00"]}, "17/04": {"h": [1.39, 1.21, -1.41, -1.49], "t": ["17:00", "03:30", "22:00", "10:00"]}, "18/04": {"h": [1.43, 1.38, -1.66, -1.26], "t": ["18:00", "04:30", "22:30", "10:30"]}}, "Thủ Dầu Một": {"13/04": {"h": [1.16, 0.34, 0.13], "t": ["16:00", "00:35", "23:00"]}, "14/04": {"h": [1.19, 0.57], "t": ["16:30", "02:20"]}, "15/04": {"h": [1.3, 0.93, -0.1, -1.05], "t": ["18:30", "01:00", "20:30", "09:00"]}, "16/04": {"h": [1.34, 1.08, -1.08], "t": ["17:30", "03:30", "10:30"]}, "17/04": {"h": [1.38, 1.26, -0.57, -0.85], "t": ["18:00", "04:00", "00:00", "12:00"]}, "18/04": {"h": [1.45, 1.39, -0.71, -0.63], "t": ["18:30", "05:30", "00:30", "13:00"]}}};
        let myChart;
        const stationEl = document.getElementById('stationSelect');
        const datePicker = document.getElementById('datePicker');
        const themeBtn = document.getElementById('themeToggle');

        if (localStorage.theme === 'dark') { document.body.classList.remove('light-mode'); document.getElementById('sunIcon').classList.add('hidden'); document.getElementById('moonIcon').classList.remove('hidden'); }
        themeBtn.onclick = () => { const isL = document.body.classList.toggle('light-mode'); localStorage.theme = isL ? 'light' : 'dark'; document.getElementById('sunIcon').classList.toggle('hidden'); document.getElementById('moonIcon').classList.toggle('hidden'); updateUI(); };

        async function init() {
            try { const response = await fetch('data.json?v=' + Date.now()); if (response.ok) rawData = await response.json(); } catch (e) {}
            const station = stationEl.value;
            const dates = Object.keys(rawData[station]).sort((a,b) => { const pA = a.split('/'), pB = b.split('/'); return new Date(2026, pA[1]-1, pA[0]) - new Date(2026, pB[1]-1, pB[0]); });
            if (dates.length > 0) {
                const today = new Date();
                const tStr = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth()+1).padStart(2, '0')}`;
                const defDate = dates.includes(tStr) ? tStr : dates[dates.length-1];
                datePicker.value = `2026-${defDate.split('/')[1]}-${defDate.split('/')[0]}`;
            }
            updateUI();
        }

        function updateUI() {
            const station = stationEl.value;
            const sParts = datePicker.value.split('-');
            const sDate = `${sParts[2]}/${sParts[1]}`;
            if (!rawData[station] || !rawData[station][sDate]) return;

            // Update Title with Date
            document.getElementById('statsTitle').innerText = `Chi tiết dự báo ngày ${sDate}/2026`;

            const dayData = rawData[station][sDate];
            const stats = document.getElementById('statsContainer');
            stats.innerHTML = dayData.h.map((h, i) => {
                const color = h >= 1.40 ? (h >= 1.60 ? 'text-red-500' : 'text-amber-500') : (h >= 0 ? 'text-blue-600' : 'text-slate-400');
                // Tính chiều cao cột nước trong card (max 2.2m = 100%)
                const waterHeight = Math.max(0, Math.min(100, ((h + 2.2) / 4.4) * 100));
                return `<div class="glass p-8 rounded-[3rem] card-tide border-b-[12px] ${h >= 1.40 ? (h>=1.6?'border-red-500':'border-amber-500') : 'border-blue-500/20'}">
                    <p class="text-[0.7rem] font-black uppercase tracking-[0.3em] text-slate-500 mb-5 relative z-10">${h>=0?'Đỉnh':'Chân'} Triều ${Math.floor(i/2)+1}</p>
                    <p class="text-6xl font-black ${color} tracking-tighter relative z-10">${h.toFixed(2)}<span class="text-sm ml-1 font-black text-slate-400">m</span></p>
                    <p class="mt-8 text-slate-500 font-black text-xs tracking-widest bg-blue-500/5 py-2 px-4 rounded-full w-fit relative z-10">${dayData.t[i]}</p>
                    <div class="water-fill bg-blue-500" style="height: ${waterHeight}%"></div>
                </div>`;
            }).join('');

            const maxH = Math.max(...dayData.h);
            const alertBox = document.getElementById('alertBox');
            if (maxH >= 1.40) { alertBox.classList.remove('hidden'); document.getElementById('alertMsg').innerText = `Mực nước dự báo tại trạm ${station} là ${maxH.toFixed(2)}m. Vùng thấp trũng ven sông có nguy cơ ngập úng cao.`; } else { alertBox.classList.add('hidden'); }

            const allDates = Object.keys(rawData[station]).sort((a,b) => { const pA = a.split('/'), pB = b.split('/'); return new Date(2026, pA[1]-1, pA[0]) - new Date(2026, pB[1]-1, pB[0]); });
            const startIdx = allDates.indexOf(sDate);
            let pts = [];
            for (let i = 0; i < 3; i++) {
                const d = allDates[startIdx + i];
                if (d) {
                    const dD = rawData[station][d];
                    dD.h.forEach((h, j) => { pts.push({ h, label: `${d} ${dD.t[j]}`, sortK: `${d.split('/').reverse().join('')}${dD.t[j]}` }); });
                }
            }
            pts.sort((a,b) => a.sortK.localeCompare(b.sortK));
            renderChart(pts);
        }

        function renderChart(pts) {
            const isL = document.body.classList.contains('light-mode');
            if (myChart) myChart.destroy();
            const canvas = document.getElementById('tideChart');
            const ctx = canvas.getContext('2d');
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: pts.map(p => p.label),
                    datasets: [{
                        data: pts.map(p => p.h),
                        borderWidth: 8,
                        pointRadius: 6,
                        pointHoverRadius: 12,
                        pointBackgroundColor: '#fff',
                        fill: true,
                        backgroundColor: function(context) {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const grad = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            grad.addColorStop(0, isL ? 'rgba(14, 165, 233, 0.4)' : 'rgba(30, 64, 175, 0.5)');
                            grad.addColorStop(1, 'rgba(14, 165, 233, 0)');
                            return grad;
                        },
                        tension: 0.45,
                        borderColor: function(context) {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const yScale = chart.scales.y;
                            const grad = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            const getPos = (val) => Math.max(0, Math.min(1, (yScale.getPixelForValue(val) - chartArea.top) / (chartArea.bottom - chartArea.top)));
                            grad.addColorStop(0, '#ef4444'); 
                            grad.addColorStop(getPos(1.6), '#ef4444');
                            grad.addColorStop(getPos(1.6), '#f97316'); 
                            grad.addColorStop(getPos(1.5), '#f97316');
                            grad.addColorStop(getPos(1.5), '#fbbf24'); 
                            grad.addColorStop(getPos(1.4), '#fbbf24');
                            grad.addColorStop(getPos(1.4), '#3b82f6'); 
                            grad.addColorStop(getPos(0), '#3b82f6');
                            grad.addColorStop(getPos(0), '#94a3b8');   
                            grad.addColorStop(1, '#94a3b8');
                            return grad;
                        }
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { min: -2.2, max: 2.2, ticks: { color: isL?'#0c4a6e':'#94a3b8', font: {weight:'900', size: 12} }, grid: { color: isL?'#e0f2fe':'rgba(255,255,255,0.05)' } },
                        x: { ticks: { color: isL?'#0c4a6e':'#94a3b8', font: {weight:'900'}, maxRotation: 45 }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        annotation: {
                            annotations: {
                                bd1: { type: 'line', yMin: 1.4, yMax: 1.4, borderColor: '#fbbf24', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: 'BĐ I', position: 'start', backgroundColor: '#fbbf24', color: '#000', font: {size: 10, weight: '900'} } },
                                bd2: { type: 'line', yMin: 1.5, yMax: 1.5, borderColor: '#f97316', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: 'BĐ II', position: 'start', backgroundColor: '#f97316', color: '#fff', font: {size: 10, weight: '900'} } },
                                bd3: { type: 'line', yMin: 1.6, yMax: 1.6, borderColor: '#ef4444', borderWidth: 3, borderDash: [5, 5], label: { display: true, content: 'BĐ III', position: 'start', backgroundColor: '#ef4444', color: '#fff', font: {size: 10, weight: '900'} } }
                            }
                        }
                    }
                }
            });
        }

        stationEl.onchange = updateUI;
        datePicker.onchange = updateUI;
        init();
    </script>
</body>
</html>
