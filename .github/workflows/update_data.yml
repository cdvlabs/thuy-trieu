name: Update Tide Data Automatically

on:
  schedule:
    - cron: '30 2 * * *'  # Chạy lúc 9:30 AM giờ VN mỗi ngày
  push:
    paths:
      - 'HCMC_TVHN_*.pdf'
  workflow_dispatch:      # Cho phép bạn bấm nút chạy thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pdfplumber requests

    - name: Run parser (Auto-download & Parse)
      run: python parse_pdf.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        git commit -m "Auto-update tide data from PDF" || echo "No changes to commit"
        git push
