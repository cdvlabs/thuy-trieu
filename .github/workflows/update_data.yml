name: Update Tide Data Automatically

on:
  schedule:
    - cron: '30 2 * * *'  # 09:30 AM VN
    - cron: '30 9 * * *'  # 16:30 PM VN
  push:
    paths:
      - 'HCMC_TVHN_*.pdf'
      - 'parse_pdf.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Thêm dòng này để ép sử dụng Node.js 24 và xóa bỏ cảnh báo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pdfplumber requests

    - name: Run parser (Auto-download & Parse)
      run: python parse_pdf.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        git commit -m "Auto-update tide data from PDF [skip ci]" || echo "No changes to commit"
        git push
